<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

<head>
    {% include head.html %}
</head>

<body>
    <script>
        if (localStorage.getItem('dark-mode-state') === '1') {
            document.body.classList.add('dark-mode');
        }
    </script>
    {% include loader.html %}
    {% include nav.html %}

    <main>
        {{ content }}
    </main>

    {% unless page.hide_footer %}
    {% include footer.html %}
    {% endunless %}

    {% include scripts.html %}
</body>

</html>
