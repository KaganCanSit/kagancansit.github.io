# Site settings
title: "Kağan Can Şit"
description: "Software Engineer - Projects, blog posts and more..."
author: Kağan Can Şit
url: "https://kagancansit.github.io"
baseurl: ""
lang: en

# Social Links
email: "kagancansit@hotmail.com"
linkedin: "kagancansit"
github: "KaganCanSit"
twitter: "kagancansit"

# Google Analytics
google_analytics: "G-2BLQV2M3JL"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/
encoding: utf-8

# Kramdown settings
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Sass/SCSS Settings
sass:
  style: compressed
  sass_dir: assets/css
  sourcemap: never # If require CSS debug remove this

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - notes.md # Notes for me 

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Kağan Can Şit"
  - scope:
      path: ""
    values:
      layout: "default"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2

# Blog pagination (jekyll-paginate-v2). Only pages with a `pagination:`
# front-matter block (see blog.html) are actually paginated.
pagination:
  enabled: true
  per_page: 9
  permalink: '/:num/'
  title: ':title - Sayfa :num'
  sort_field: 'date'
  sort_reverse: true
  trail:
    before: 2
    after: 2