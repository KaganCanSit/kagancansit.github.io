# Quality gate: builds the site and validates the generated HTML
# (broken internal links, missing images/scripts) before anything
# reaches main. Deployment stays in pages.yml.
name: CI

on:
  pull_request:
  push:
    branches-ignore: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        # https://github.com/ruby/setup-ruby/releases/tag/v1.316.0
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          ruby-version: "3.4"
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Check generated HTML
        # External links are skipped on purpose: third-party outages or
        # rate limits must not fail CI. Internal consistency is enforced.
        run: bundle exec htmlproofer _site --disable-external --checks Links,Images,Scripts
